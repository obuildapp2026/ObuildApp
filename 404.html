<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pagina niet gevonden — GWA Supply Chain & AI Solutions</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060F1E;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0;}
.content{position:relative;z-index:1;}
.num{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;line-height:1;background:linear-gradient(135deg,#fff,#00C9A7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:12px;}
p{color:rgba(255,255,255,0.55);font-size:15px;font-weight:300;margin-bottom:36px;}
.btn{background:linear-gradient(135deg,#00C9A7,#00A88A);color:#060F1E;padding:14px 32px;border-radius:10px;text-decoration:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:inline-block;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,201,167,0.3);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,201,167,0.4);}
.chain{font-size:48px;margin-bottom:24px;opacity:0.3;}
</style>
</head>
<body>
<div class="content">
  <div class="chain">🔗</div>
  <div class="num">404</div>
  <h1>Deze schakel ontbreekt</h1>
  <p>De pagina die u zoekt bestaat niet of is verplaatst.</p>
  <a href="index.html" class="btn">← Terug naar de homepage</a>
</div>
</body>
</html>
